<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meeting Room Booking</title>
    <link rel="icon" type="image/jpeg" href="kf_logo.jpg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
    <div class="app-container">
        <div class="main-card">
            <h1 class="page-title">Meeting Room Booking</h1>
            <p id="success-message" class="hidden-message">Action Successful</p>
            
            <div class="booking-grid">
                <div class="booking-panel">
                    <h3>Select Date & Time</h3>
                    <div class="form-group">
                        <label for="booking-date">Select Date:</label>
                        <div class="date-input-wrapper">
                            <input type="text" id="booking-date" class="form-control" placeholder="Select a date...">
                            <button id="today-btn" class="today-btn">Today</button>
                        </div>
                    </div>
                    <div class="time-selectors">
                        <div class="form-group">
                            <label for="start-time">Start Time:</label>
                            <select id="start-time" class="form-control"></select>
                        </div>
                        <div class="form-group">
                            <label for="end-time">End Time:</label>
                            <select id="end-time" class="form-control"></select>
                        </div>
                    </div>
                    <button id="book-btn" class="book-btn">Check Availability & Book</button>
                </div>

                <div class="booking-panel">
                    <h3>Booked Meetings</h3>
                    <div id="booked-times-list" class="time-slots">
                        <p class="empty-state">Select a date to view bookings.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="booking-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Confirm Booking</h2>
            <p id="modal-time-slot" class="text-muted"></p>
            <form id="booking-form">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="project">Project / Subsidiary</label>
                    <input type="text" id="project" required>
                </div>
                <div class="form-group">
                    <label for="password">Cancellation Password</label>
                    <input type="password" id="password" placeholder="Password to cancel later" required>
                </div>
                <button type="submit" class="primary-btn">Confirm Booking</button>
            </form>
        </div>
    </div>

    <div id="cancel-modal" class="modal">
        <div class="modal-content">
            <span class="close-cancel-btn close-btn">&times;</span>
            <h2>Cancel Booking</h2>
            <p class="text-muted">Enter the password you created when booking this slot.</p>
            <div class="form-group">
                <input type="password" id="cancel-password" placeholder="Booking Password" required>
            </div>
            <button id="confirm-cancel-btn" class="danger-btn">Delete Booking</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDAA9dcHLGgZWfH6FzHqj1EO5pkOz5A778",
            authDomain: "booking-kf-double.firebaseapp.com",
            projectId: "booking-kf-double",
            storageBucket: "booking-kf-double.firebasestorage.app",
            messagingSenderId: "239605713305",
            appId: "1:239605713305:web:ff09d82613af32d2f22b08",
            measurementId: "G-FXMKHMMSDB"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
